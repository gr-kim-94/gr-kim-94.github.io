        - "서울도시가스: AVFoundation 바코드 인식 기반 장비 입출고 관리, 카메라 세션 비동기 처리로 UI 프리징 없음"
        - "노랑풍선: WKWebsiteDataStore 쿠키 공유로 자동로그인, AppSolid 보안 솔루션 적용"

